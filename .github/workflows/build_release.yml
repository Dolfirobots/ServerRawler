name: Release Build

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build for ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            artifact_name: ServerRawler-Linux
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: ServerRawler-Windows.exe
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: ServerRawler-Apple

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install MUSL Tools (only for linux)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get install -y musl-tools

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename and Prepare Binary
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release/
          
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            mv *.exe ../../../${{ matrix.artifact_name }}
          else
            mv ServerRawler ../../../${{ matrix.artifact_name }} || mv server_rawler ../../../${{ matrix.artifact_name }}
          fi

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}