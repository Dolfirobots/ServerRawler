name: Release Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: serverrawler-linux-amd64
          # Raspberry Pi 4 / 5 (64-bit)
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact_name: serverrawler-linux-arm64
          # Raspberry Pi 3 / Zero 2 (32-bit)
          - os: ubuntu-latest
            target: armv7-unknown-linux-gnueabihf
            artifact_name: serverrawler-linux-armv7
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: serverrawler-windows-amd64.exe
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: serverrawler-macos-amd64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: serverrawler-macos-arm64

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install Cross
        if: matrix.os == 'ubuntu-latest'
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build Binary
        run: |
          if [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi
        shell: bash

      - name: Prepare Artifacts
        run: |
          mkdir -p staging
          if [ -f "target/${{ matrix.target }}/release/ServerRawler.exe" ]; then
            cp "target/${{ matrix.target }}/release/ServerRawler.exe" "staging/${{ matrix.artifact_name }}"
          else
            cp "target/${{ matrix.target }}/release/ServerRawler" "staging/${{ matrix.artifact_name }}"
          fi
        shell: bash

      - name: Push to GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: staging/*
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}