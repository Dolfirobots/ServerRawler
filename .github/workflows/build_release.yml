name: Build Rust

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          profile: minimal

      - name: Build release
        run: cargo build --release

      - name: Prepare artifact (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir dist
          cp target/release/ServerRawler dist/ServerRawler-linux

      - name: Prepare artifact (Windows)
        if: runner.os == 'Windows'
        run: |
          mkdir dist
          copy target\release\ServerRawler.exe dist\ServerRawler-windows.exe

      - name: Upload release binaries
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
