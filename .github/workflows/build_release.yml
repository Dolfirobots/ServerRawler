name: Release Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag'
        required: true

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: serverrawler-linux-amd64
          # Windows x64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: serverrawler-windows-amd64.exe
          # macOS Intel & Apple Silicon
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: serverrawler-macos-amd64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: serverrawler-macos-arm64
          # Raspberry Pi
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact_name: serverrawler-linux-arm64

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag_name || github.ref }}

      - name: Install Dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev pkg-config
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-gnu" ]; then
            sudo apt-get install -y gcc-aarch64-linux-gnu
          fi

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build Binary
        run: |
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-gnu" ]; then
            export CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc
          fi
          cargo build --release --target ${{ matrix.target }}
        shell: bash

      - name: Prepare Artifacts
        run: |
          mkdir -p staging
          if [ -f "target/${{ matrix.target }}/release/ServerRawler.exe" ]; then
            cp "target/${{ matrix.target }}/release/ServerRawler.exe" "staging/${{ matrix.artifact_name }}"
          elif [ -f "target/${{ matrix.target }}/release/ServerRawler" ]; then
            cp "target/${{ matrix.target }}/release/ServerRawler" "staging/${{ matrix.artifact_name }}"
          fi
        shell: bash

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: staging/${{ matrix.artifact_name }}
          retention-days: 1

  publish:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag_name || github.ref_name }}
          files: artifacts/**/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}