name: Release Build

on:
  push:
    tags:
      - 'v*' # Triggert bei Tags wie v0.2.0
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag zum Builden auswählen'
        required: true
        type: string

jobs:
  build:
    name: Build for ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact_name: serverrawler-linux-x64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact_name: serverrawler-windows-x64.exe
          # For Raspberry Pi 4/5
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact_name: serverrawler-raspi-arm64
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact_name: serverrawler-macos-x64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact_name: serverrawler-macos-arm64

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag_name || github.ref }}

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install Cross
        if: contains(matrix.target, 'linux')
        run: cargo install cross --git https://github.com/cross-rs/cross.git

      - name: Build Binary
        run: |
          if [[ "${{ matrix.target }}" == *"linux"* ]]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi
        shell: bash

      - name: Prepare Artifact
        run: |
          mkdir -p staging
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            cp target/${{ matrix.target }}/release/ServerRawler.exe staging/${{ matrix.artifact_name }}
          else
            cp target/${{ matrix.target }}/release/ServerRawler staging/${{ matrix.artifact_name }}
          fi
        shell: bash

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: staging/${{ matrix.artifact_name }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag_name || github.ref_name }}
          files: artifacts/**/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}