name: Build Rust

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Git tag'
        required: true

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install MUSL target (Linux)
        if: runner.os == 'Linux'
        run: rustup target add x86_64-unknown-linux-musl

      - name: Build release (Linux MUSL)
        if: runner.os == 'Linux'
        run: cargo build --release --target x86_64-unknown-linux-musl

      - name: Prepare artifact (Linux MUSL)
        if: runner.os == 'Linux'
        run: |
          mkdir -p dist
          cp target/x86_64-unknown-linux-musl/release/ServerRawler dist/ServerRawler-linux-musl

      - name: Build release (Windows)
        if: runner.os == 'Windows'
        run: cargo build --release

      - name: Prepare artifact (Windows)
        if: runner.os == 'Windows'
        run: |
          mkdir dist
          copy target\release\ServerRawler.exe dist\ServerRawler-windows.exe

      - name: Upload release binaries
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
